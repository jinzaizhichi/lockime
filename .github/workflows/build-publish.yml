name: Build & Publish

# Reusable build+publish pipeline shared by release.yml (stable) and
# nightly.yml (beta). Builds, tests, notarizes, staples, then tags the built
# commit, publishes a GitHub Release with the zips/dmgs, and updates the
# Sparkle appcasts on gh-pages. Callers compute the version
# (scripts/ci/compute_version.sh) and pass it in; local builds stay at
# 0.0.0-development.
#
# Every release ships one app PER ARCHITECTURE (arm64 + x86_64), never a
# universal binary (download size), each with its own Sparkle feed:
#   appcast.xml         — arm64. This is the URL baked into every shipped
#                         build's Info.plist (including all pre-x86_64
#                         releases, which were arm64-only), so it must keep
#                         serving arm64-only entries forever.
#   appcast-x86_64.xml  — x86_64; pinned at compile time via #if arch in
#                         UpdaterDelegate.feedURLString(for:).
# Cross-arch updates are unsupported by design: each binary can only ever see
# its own architecture's feed.
on:
  workflow_call:
    inputs:
      version:
        description: Display version (CFBundleShortVersionString), e.g. 1.2.3 or 1.2.3-beta.4
        required: true
        type: string
      tag:
        description: Git tag to create on the built commit, e.g. v1.2.3
        required: true
        type: string
      channel:
        description: Sparkle channel (stable | beta)
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a pre-release (pre-releases are never "Latest")
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build, notarize & publish ${{ inputs.version }}
    runs-on: blacksmith-6vcpu-macos-latest
    env:
      SCHEME: LockIME
      APP_NAME: LockIME
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so the release-notes step can list the
          # direct-push commits in <previous-tag>..HEAD.
          fetch-depth: 0

      - name: Stamp build number
        id: stamp
        # Build number = CFBundleVersion = Sparkle's sort key. Date-based and
        # shared by both channels, so "newest build by wall-clock time wins"
        # holds across stable and beta — a beta follower always lands on
        # whichever build is actually newest, regardless of channel.
        run: echo "build=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode_26.app ]; then sudo xcode-select -s /Applications/Xcode_26.app; fi
          xcodebuild -version

      - name: Install tools
        # xcbeautify ships with the macOS runner image; only xcodegen is missing.
        run: brew install xcodegen

      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: bash scripts/ci/import_cert.sh

      - name: Generate project
        run: xcodegen generate

      - name: Test
        run: |
          set -o pipefail
          xcodebuild -scheme "$SCHEME" -configuration Debug \
            -derivedDataPath build/DerivedData \
            -destination 'platform=macOS,arch=arm64' test | xcbeautify

      - name: Archive (Release, Developer ID, one archive per arch)
        # ARCHS comes from the command line (project.yml pins arm64 for local
        # builds); both archives share DerivedData — intermediates are keyed
        # by arch, and the SPM graph resolves once.
        run: |
          set -euo pipefail
          for ARCH in arm64 x86_64; do
            xcodebuild -scheme "$SCHEME" -configuration Release \
              -derivedDataPath build/DerivedData \
              -destination 'generic/platform=macOS' \
              -archivePath "build/$APP_NAME-$ARCH.xcarchive" \
              MARKETING_VERSION="${{ inputs.version }}" \
              CURRENT_PROJECT_VERSION="${{ steps.stamp.outputs.build }}" \
              ARCHS="$ARCH" ONLY_ACTIVE_ARCH=NO \
              archive | xcbeautify
          done

      - name: Export archives
        run: |
          set -euo pipefail
          for ARCH in arm64 x86_64; do
            xcodebuild -exportArchive \
              -archivePath "build/$APP_NAME-$ARCH.xcarchive" \
              -exportOptionsPlist scripts/ci/ExportOptions.plist \
              -exportPath "build/export-$ARCH" | xcbeautify
            APP="build/export-$ARCH/$APP_NAME.app"
            codesign --verify --deep --strict --verbose=2 "$APP"
            # The whole point of per-arch apps: refuse to ship a bundle whose
            # main binary or embedded Sparkle is fat or the wrong arch (the
            # thin-frameworks build phase must have stripped the other slice).
            test "$(lipo -archs "$APP/Contents/MacOS/$APP_NAME")" = "$ARCH"
            # Via the framework's top-level symlink, so a future Sparkle
            # version-letter bump can't turn this into a confusing ENOENT.
            test "$(lipo -archs "$APP/Contents/Frameworks/Sparkle.framework/Sparkle")" = "$ARCH"
          done

      - name: Notarize & staple
        env:
          MACOS_NOTARIZATION_KEY: ${{ secrets.MACOS_NOTARIZATION_KEY }}
          MACOS_NOTARIZATION_KEY_ID: ${{ secrets.MACOS_NOTARIZATION_KEY_ID }}
          MACOS_NOTARIZATION_ISSUER_ID: ${{ secrets.MACOS_NOTARIZATION_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$MACOS_NOTARIZATION_KEY" > "$RUNNER_TEMP/notary_key.p8"
          for ARCH in arm64 x86_64; do
            APP="build/export-$ARCH/$APP_NAME.app"
            # Zip for submission (notarytool wants a ditto archive).
            ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize-$ARCH.zip"
            xcrun notarytool submit "$RUNNER_TEMP/notarize-$ARCH.zip" \
              --key "$RUNNER_TEMP/notary_key.p8" \
              --key-id "$MACOS_NOTARIZATION_KEY_ID" \
              --issuer "$MACOS_NOTARIZATION_ISSUER_ID" \
              --wait
            xcrun stapler staple "$APP"
          done
          rm -f "$RUNNER_TEMP/notary_key.p8"

      - name: Package distribution zips (after stapling)
        # One dist directory per arch: each is a separate generate_appcast
        # scan root, so a feed can only ever see its own architecture's
        # archive — cross-arch entries are structurally impossible.
        run: |
          set -euo pipefail
          for ARCH in arm64 x86_64; do
            mkdir -p "build/dist-$ARCH"
            APP="build/export-$ARCH/$APP_NAME.app"
            # Re-zip the STAPLED app (re-zipping after staple is safe).
            ditto -c -k --keepParent "$APP" "build/dist-$ARCH/$APP_NAME-${{ inputs.version }}-$ARCH.zip"
          done

      - name: Generate release notes (single source for appcast + Release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Sparkle shows release notes ONLY from the appcast item — it never
        # reads the GitHub Release body. generate_appcast embeds a release-note
        # file that sits next to the archive with the SAME basename and a
        # .md/.html/.txt extension (so build/dist-<arch>/LockIME-<ver>-<arch>.zip
        # pairs with build/dist-<arch>/LockIME-<ver>-<arch>.md) as a CDATA
        # <description>. That file must
        # exist BEFORE "Build appcasts" below — which runs before the Release is
        # even created. So generate the notes once here with GitHub's own
        # generator and reuse the SAME markdown for both surfaces: the appcast
        # description and the Release body further down. One source of truth, no
        # drift between the update window and the Release page.
        #
        # Embed MARKDOWN, not HTML. The update window renders the description
        # with swift-markdown-ui (a Markdown renderer, not a WebView — see
        # UpdateWindowView), so a .md file makes generate_appcast tag it
        # sparkle:format="markdown" and embed it verbatim, and the app styles it
        # natively. A GFM-pre-rendered HTML fragment would instead surface as
        # raw "<h2 dir=…>" tags in that view.
        run: |
          set -euo pipefail
          # The tag does not exist yet (it is created in the publish step), so
          # pin the diff to the built commit; GitHub auto-selects the previous
          # tag.
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ inputs.tag }}" \
            -f target_commitish="${{ github.sha }}" \
            --jq .body > build/release-notes.md
          # generate-notes sees only merged PRs ("What's Changed" bullets) —
          # commits pushed straight to the branch are invisible to it. ALWAYS
          # augment the generated body with those direct-push commits, so a
          # release mixing PRs and direct pushes lists both.
          #
          # Reuse the exact base GitHub chose for its compare link so the
          # commit range matches the "Full Changelog" diff. Anchored to that
          # line, NOT any compare URL in the body: a PR title may itself
          # contain one, and the bullets sit above the Full Changelog line.
          # Empty (→ whole history) only for the very first release, which
          # has no prior tag.
          PREV="$(sed -nE 's#^\*\*Full Changelog\*\*:.*/compare/(.+)\.\.\..*#\1#p' build/release-notes.md | head -1)"
          if [ -n "$PREV" ]; then RANGE="$PREV..${{ github.sha }}"; else RANGE="${{ github.sha }}"; fi
          # A commit is a direct push iff no merged PR introduced it. Asking
          # GitHub per commit (instead of pattern-matching the squash suffix
          # "(#N)" onto subjects) stays correct when a squash title was edited
          # to drop the suffix and under any future merge strategy.
          : > build/direct-commits.md
          while read -r SHA SHORT SUBJECT; do
            [ -n "$SHA" ] || continue
            MERGED_PRS="$(gh api "repos/${{ github.repository }}/commits/$SHA/pulls" \
              --jq '[.[] | select(.merged_at != null)] | length')"
            if [ "$MERGED_PRS" -eq 0 ]; then
              # Explicit markdown links — neither the update window's renderer
              # nor GitHub autolinks a backticked short hash.
              printf '* %s ([`%s`](https://github.com/%s/commit/%s))\n' \
                "$SUBJECT" "$SHORT" "${{ github.repository }}" "$SHA" >> build/direct-commits.md
            fi
          done < <(git log --reverse --no-merges --pretty='tformat:%H %h %s' "$RANGE")
          if [ -s build/direct-commits.md ]; then
            # A PR-less body has no section header at all (just the "Full
            # Changelog" line) — create the one the commits belong in.
            if ! grep -q "^## What's Changed" build/release-notes.md; then
              printf "## What's Changed\n\n" | cat - build/release-notes.md > build/release-notes.md.new
              mv build/release-notes.md.new build/release-notes.md
            fi
            # Splice the commit bullets onto the end of the "What's Changed"
            # section: right before the next section GitHub may emit ("## New
            # Contributors") or the trailing "Full Changelog" line.
            awk '
              NR == FNR { commits[FNR] = $0; n = FNR; next }
              !spliced && (/^## New Contributors/ || /^\*\*Full Changelog/) {
                for (i = 1; i <= n; i++) print commits[i]
                print ""
                spliced = 1
              }
              { print }
              END { if (!spliced) for (i = 1; i <= n; i++) print commits[i] }
            ' build/direct-commits.md build/release-notes.md > build/release-notes.md.new
            mv build/release-notes.md.new build/release-notes.md
          fi
          echo "Direct-push commits in ${RANGE}: $(wc -l < build/direct-commits.md | tr -d ' ')"
          # Stage the markdown next to each arch's archive (same basename,
          # .md) so the next step's generate_appcast --embed-release-notes
          # inlines it as a CDATA <description sparkle:format="markdown">. No
          # hosting and no GFM pre-render: the app's MarkdownUI view linkifies
          # and styles it. Both feeds carry the same notes.
          for ARCH in arm64 x86_64; do
            cp build/release-notes.md "build/dist-$ARCH/$APP_NAME-${{ inputs.version }}-$ARCH.md"
          done
          echo "Release notes: $(wc -l < build/release-notes.md | tr -d ' ') md lines staged for appcasts + Release"

      - name: Build appcasts (Sparkle, signs with EdDSA key)
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          GA="build/DerivedData/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast"
          echo "$SPARKLE_EDDSA_PRIVATE_KEY" > "$RUNNER_TEMP/eddsa_priv"
          # Bring the existing feeds forward so prior versions are preserved.
          # Read them from the gh-pages BRANCH, not the served Pages URL: the
          # CDN caches for ~10 minutes and deploys asynchronously, and a
          # transient fetch failure must hard-fail instead of silently
          # truncating a feed to just this build. Only a genuinely missing
          # branch/file starts that feed fresh (the first release ever, or the
          # first x86_64 release seeding its brand-new feed).
          if git ls-remote --exit-code origin refs/heads/gh-pages >/dev/null; then
            git fetch --depth 1 origin gh-pages
            HAVE_PAGES=true
          else
            rc=$?
            if [ "$rc" -ne 2 ]; then
              echo "error: could not query origin for gh-pages (exit $rc)" >&2
              exit 1
            fi
            echo "No gh-pages branch yet — all feeds start fresh"
            HAVE_PAGES=false
          fi
          for ARCH in arm64 x86_64; do
            # appcast.xml is the URL baked into every shipped arm64 build
            # (including all pre-x86_64 releases) — only arm64 entries may
            # ever land in it. x86_64 has its own feed file.
            FEED=appcast.xml
            [ "$ARCH" = "x86_64" ] && FEED=appcast-x86_64.xml
            if [ "$HAVE_PAGES" = true ] && git cat-file -e "FETCH_HEAD:$FEED" 2>/dev/null; then
              git show "FETCH_HEAD:$FEED" > "build/dist-$ARCH/appcast.xml"
              echo "Seeded $FEED from gh-pages"
            else
              echo "gh-pages has no $FEED yet — starting fresh"
            fi
            # Args array is never empty at expansion time — expanding an empty
            # array under set -u is fatal on the runners' bash 3.2.
            GA_ARGS=(
              --ed-key-file "$RUNNER_TEMP/eddsa_priv"
              # REQUIRED: inline the LockIME-<ver>-<arch>.md staged above as a
              # CDATA <description sparkle:format="markdown">. Markdown notes
              # are NOT embedded by default (only DOCTYPE/body-less HTML
              # fragments are) — without this flag generate_appcast would emit
              # a sparkle:releaseNotesLink pointing at an un-hosted .md (404).
              --embed-release-notes
              --download-url-prefix "https://github.com/oomol-lab/LockIME/releases/download/${{ inputs.tag }}/"
            )
            if [ "${{ inputs.channel }}" = "beta" ]; then GA_ARGS+=(--channel beta); fi
            "$GA" "${GA_ARGS[@]}" "build/dist-$ARCH"
          done
          rm -f "$RUNNER_TEMP/eddsa_priv"

      - name: Build DMGs (from the stapled apps)
        # Built AFTER the appcasts and into a directory generate_appcast never
        # scans (build/dmg, not build/dist-*): the appcasts must reference only
        # the zips — the .dmg is a manual-download convenience, not an update
        # channel.
        run: |
          set -euo pipefail
          for ARCH in arm64 x86_64; do
            DMG="build/dmg/$APP_NAME-${{ inputs.version }}-$ARCH.dmg"
            scripts/make-dmg.sh "build/export-$ARCH/$APP_NAME.app" "$DMG"
            # Sign the image itself so Gatekeeper trusts the container, not
            # just the (already-signed, already-stapled) app inside it.
            codesign --force --sign "Developer ID Application" --timestamp "$DMG"
          done

      - name: Notarize & staple DMGs
        env:
          MACOS_NOTARIZATION_KEY: ${{ secrets.MACOS_NOTARIZATION_KEY }}
          MACOS_NOTARIZATION_KEY_ID: ${{ secrets.MACOS_NOTARIZATION_KEY_ID }}
          MACOS_NOTARIZATION_ISSUER_ID: ${{ secrets.MACOS_NOTARIZATION_ISSUER_ID }}
        run: |
          set -euo pipefail
          echo "$MACOS_NOTARIZATION_KEY" > "$RUNNER_TEMP/notary_key.p8"
          for ARCH in arm64 x86_64; do
            DMG="build/dmg/$APP_NAME-${{ inputs.version }}-$ARCH.dmg"
            # A .dmg is itself a valid notarization submission — no wrapping zip.
            xcrun notarytool submit "$DMG" \
              --key "$RUNNER_TEMP/notary_key.p8" \
              --key-id "$MACOS_NOTARIZATION_KEY_ID" \
              --issuer "$MACOS_NOTARIZATION_ISSUER_ID" \
              --wait
            xcrun stapler staple "$DMG"
          done
          rm -f "$RUNNER_TEMP/notary_key.p8"

      - name: Tag & publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          # Pin the tag to the commit that was actually built, not whatever
          # the default branch points at by the time this step runs.
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.prerelease }}
          # Four artifacts per release: a zip (the Sparkle enclosure) and a
          # dmg (manual download) for each architecture. The dist dirs also
          # hold .md release notes and the appcast — only the zips ship.
          files: |
            build/dist-arm64/*.zip
            build/dist-x86_64/*.zip
            build/dmg/*.dmg
          # Reuse the exact notes embedded in the appcast (generated above) so
          # the Release page and the Sparkle update window never disagree.
          # (Replaces generate_release_notes: true, which would regenerate them
          # independently and only populate the Release page, not the appcast.)
          body_path: build/release-notes.md

      - name: Stage appcasts for gh-pages
        # Publish ONLY the appcasts. The dist dirs also hold the distribution
        # zips, which the appcasts never reference (enclosure URLs point at
        # GitHub Releases) — publishing those would grow gh-pages by one app
        # bundle per build, forever. The arm64 feed keeps the historical
        # appcast.xml name: it is the URL baked into every shipped build.
        run: |
          set -euo pipefail
          mkdir -p build/pages
          cp build/dist-arm64/appcast.xml build/pages/appcast.xml
          cp build/dist-x86_64/appcast.xml build/pages/appcast-x86_64.xml

      - name: Publish appcast to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/pages
          publish_branch: gh-pages
          keep_files: true

      - name: Mint Homebrew tap token
        # Cross-repo dispatch needs more than GITHUB_TOKEN (which is scoped
        # to this repository), so mint a 1-hour installation token from the
        # org's GitHub App (installed on homebrew-tap only, Contents r/w).
        # Stable releases only — the cask tracks the stable channel.
        id: tap-token
        if: ${{ !inputs.prerelease }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.OOMOL_LAB_GITHUB_APP_CLIENT_ID }}
          private-key: ${{ secrets.OOMOL_LAB_GITHUB_APP_PRIVATE_KEY }}
          # Both owner AND repositories: the App is not installed on this
          # repo, and owner alone would scope the token to every repo of
          # the installation.
          owner: oomol-lab
          repositories: homebrew-tap
          # Least privilege, and a fast failure at mint time (instead of a
          # 403 at dispatch time) if the App's permissions ever change.
          permission-contents: write

      - name: Bump Homebrew cask (oomol-lab/homebrew-tap)
        # The payload carries just the version: the tap's bump-lockime
        # workflow re-downloads the published zips and computes the sha256
        # hashes itself, so the cask can never disagree with the actual
        # artifacts. Runs last on purpose: release + appcasts are already
        # out if this fails.
        if: ${{ !inputs.prerelease }}
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
          VERSION: ${{ inputs.version }}
        run: |
          gh api repos/oomol-lab/homebrew-tap/dispatches \
            -f event_type=lockime-release \
            -f "client_payload[version]=$VERSION"
