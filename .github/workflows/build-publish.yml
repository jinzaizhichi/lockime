name: Build & Publish

# Reusable build+publish pipeline shared by release.yml (stable) and
# nightly.yml (beta). Builds, tests, notarizes, staples, then tags the built
# commit, publishes a GitHub Release with the zip, and updates the Sparkle
# appcast on gh-pages. Callers compute the version (scripts/ci/compute_version.sh)
# and pass it in; local builds stay at 0.0.0-development.
on:
  workflow_call:
    inputs:
      version:
        description: Display version (CFBundleShortVersionString), e.g. 1.2.3 or 1.2.3-beta.4
        required: true
        type: string
      tag:
        description: Git tag to create on the built commit, e.g. v1.2.3
        required: true
        type: string
      channel:
        description: Sparkle channel (stable | beta)
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a pre-release (pre-releases are never "Latest")
        required: true
        type: boolean

permissions:
  contents: write

jobs:
  build:
    name: Build, notarize & publish ${{ inputs.version }}
    runs-on: blacksmith-6vcpu-macos-latest
    env:
      SCHEME: LockIME
      APP_NAME: LockIME
      TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags so the release-notes step can diff
          # <previous-tag>..HEAD when GitHub's generated notes list no PRs.
          fetch-depth: 0

      - name: Stamp build number
        id: stamp
        # Build number = CFBundleVersion = Sparkle's sort key. Date-based and
        # shared by both channels, so "newest build by wall-clock time wins"
        # holds across stable and beta — a beta follower always lands on
        # whichever build is actually newest, regardless of channel.
        run: echo "build=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode_26.app ]; then sudo xcode-select -s /Applications/Xcode_26.app; fi
          xcodebuild -version

      - name: Install tools
        # xcbeautify ships with the macOS runner image; only xcodegen is missing.
        run: brew install xcodegen

      - name: Import macOS signing certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: bash scripts/ci/import_cert.sh

      - name: Generate project
        run: xcodegen generate

      - name: Test
        run: |
          set -o pipefail
          xcodebuild -scheme "$SCHEME" -configuration Debug \
            -derivedDataPath build/DerivedData \
            -destination 'platform=macOS,arch=arm64' test | xcbeautify

      - name: Archive (Release, Developer ID)
        run: |
          set -o pipefail
          xcodebuild -scheme "$SCHEME" -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination 'generic/platform=macOS' \
            -archivePath "build/$APP_NAME.xcarchive" \
            MARKETING_VERSION="${{ inputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.stamp.outputs.build }}" \
            archive | xcbeautify

      - name: Export archive
        run: |
          set -o pipefail
          xcodebuild -exportArchive \
            -archivePath "build/$APP_NAME.xcarchive" \
            -exportOptionsPlist scripts/ci/ExportOptions.plist \
            -exportPath build/export | xcbeautify
          codesign --verify --deep --strict --verbose=2 "build/export/$APP_NAME.app"

      - name: Notarize & staple
        env:
          MACOS_NOTARIZATION_KEY: ${{ secrets.MACOS_NOTARIZATION_KEY }}
          MACOS_NOTARIZATION_KEY_ID: ${{ secrets.MACOS_NOTARIZATION_KEY_ID }}
          MACOS_NOTARIZATION_ISSUER_ID: ${{ secrets.MACOS_NOTARIZATION_ISSUER_ID }}
        run: |
          set -euo pipefail
          APP="build/export/$APP_NAME.app"
          echo "$MACOS_NOTARIZATION_KEY" > "$RUNNER_TEMP/notary_key.p8"
          # Zip for submission (notarytool wants a ditto archive).
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/notary_key.p8" \
            --key-id "$MACOS_NOTARIZATION_KEY_ID" \
            --issuer "$MACOS_NOTARIZATION_ISSUER_ID" \
            --wait
          xcrun stapler staple "$APP"
          rm -f "$RUNNER_TEMP/notary_key.p8"

      - name: Package distribution zip (after stapling)
        id: package
        run: |
          set -euo pipefail
          mkdir -p build/dist
          APP="build/export/$APP_NAME.app"
          ZIP="build/dist/$APP_NAME-${{ inputs.version }}.zip"
          # Re-zip the STAPLED app (re-zipping after staple is safe).
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"

      - name: Generate release notes (single source for appcast + Release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Sparkle shows release notes ONLY from the appcast item — it never
        # reads the GitHub Release body. generate_appcast embeds a release-note
        # file that sits next to the archive with the SAME basename and a
        # .md/.html/.txt extension (so build/dist/LockIME-<ver>.zip pairs with
        # build/dist/LockIME-<ver>.md) as a CDATA <description>. That file must
        # exist BEFORE "Build appcast" below — which runs before the Release is
        # even created. So generate the notes once here with GitHub's own
        # generator and reuse the SAME markdown for both surfaces: the appcast
        # description and the Release body further down. One source of truth, no
        # drift between the update window and the Release page.
        #
        # Embed MARKDOWN, not HTML. The update window renders the description
        # with swift-markdown-ui (a Markdown renderer, not a WebView — see
        # UpdateWindowView), so a .md file makes generate_appcast tag it
        # sparkle:format="markdown" and embed it verbatim, and the app styles it
        # natively. A GFM-pre-rendered HTML fragment would instead surface as
        # raw "<h2 dir=…>" tags in that view.
        run: |
          set -euo pipefail
          # The tag does not exist yet (it is created in the publish step), so
          # pin the diff to the built commit; GitHub auto-selects the previous
          # tag.
          gh api "repos/${{ github.repository }}/releases/generate-notes" \
            -f tag_name="${{ inputs.tag }}" \
            -f target_commitish="${{ github.sha }}" \
            --jq .body > build/release-notes.md
          # generate-notes lists only merged PRs under "What's Changed" (each a
          # "* " bullet). When changes land straight on the branch that section
          # is empty and the body is just the "Full Changelog" link — fall back
          # to a per-commit list so the notes are never effectively empty.
          if ! grep -q '^\* ' build/release-notes.md; then
            # Reuse the exact base GitHub chose for its compare link so the
            # commit range matches the "Full Changelog" diff. Empty (→ whole
            # history) only for the very first release, which has no prior tag.
            PREV="$(sed -nE 's#.*/compare/(.+)\.\.\..*#\1#p' build/release-notes.md | head -1)"
            if [ -n "$PREV" ]; then RANGE="$PREV..${{ github.sha }}"; else RANGE="${{ github.sha }}"; fi
            COMMITS="$(git log --reverse --no-merges --pretty='format:* %s (`%h`)' "$RANGE")"
            if [ -n "$COMMITS" ]; then
              { printf "## What's Changed\n\n%s\n\n" "$COMMITS"; cat build/release-notes.md; } \
                > build/release-notes.md.new
              mv build/release-notes.md.new build/release-notes.md
              echo "No PRs in $RANGE — wrote $(printf '%s\n' "$COMMITS" | grep -c '^\* ') commit lines"
            fi
          fi
          # Stage the markdown next to the archive (same basename, .md) so the
          # next step's generate_appcast --embed-release-notes inlines it as a
          # CDATA <description sparkle:format="markdown">. No hosting and no GFM
          # pre-render: the app's MarkdownUI view linkifies and styles it.
          cp build/release-notes.md "build/dist/$APP_NAME-${{ inputs.version }}.md"
          echo "Release notes: $(wc -l < build/release-notes.md | tr -d ' ') md lines staged for appcast + Release"

      - name: Build appcast (Sparkle, signs with EdDSA key)
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          GA="build/DerivedData/SourcePackages/artifacts/sparkle/Sparkle/bin/generate_appcast"
          echo "$SPARKLE_EDDSA_PRIVATE_KEY" > "$RUNNER_TEMP/eddsa_priv"
          # Bring the existing appcast forward so prior versions are preserved.
          # Read it from the gh-pages BRANCH, not the served Pages URL: the CDN
          # caches for ~10 minutes and deploys asynchronously, and a transient
          # fetch failure must hard-fail instead of silently truncating the
          # feed to just this build. Only a genuinely missing branch/file
          # (first release ever) starts fresh.
          if git ls-remote --exit-code origin refs/heads/gh-pages >/dev/null; then
            git fetch --depth 1 origin gh-pages
            if git cat-file -e FETCH_HEAD:appcast.xml 2>/dev/null; then
              git show FETCH_HEAD:appcast.xml > build/dist/appcast.xml
              echo "Seeded appcast from gh-pages"
            else
              echo "gh-pages has no appcast.xml yet — starting fresh"
            fi
          else
            rc=$?
            if [ "$rc" -ne 2 ]; then
              echo "error: could not query origin for gh-pages (exit $rc)" >&2
              exit 1
            fi
            echo "No gh-pages branch yet — starting fresh"
          fi
          # Args array is never empty at expansion time — expanding an empty
          # array under set -u is fatal on the runners' bash 3.2.
          GA_ARGS=(
            --ed-key-file "$RUNNER_TEMP/eddsa_priv"
            # REQUIRED: inline the LockIME-<ver>.md staged above as a CDATA
            # <description sparkle:format="markdown">. Markdown notes are NOT
            # embedded by default (only DOCTYPE/body-less HTML fragments are) —
            # without this flag generate_appcast would emit a
            # sparkle:releaseNotesLink pointing at an un-hosted .md (404).
            --embed-release-notes
            --download-url-prefix "https://github.com/oomol-lab/LockIME/releases/download/${{ inputs.tag }}/"
          )
          if [ "${{ inputs.channel }}" = "beta" ]; then GA_ARGS+=(--channel beta); fi
          "$GA" "${GA_ARGS[@]}" build/dist
          rm -f "$RUNNER_TEMP/eddsa_priv"

      - name: Build DMG (from the stapled app)
        id: dmg
        # Built AFTER the appcast and into a directory generate_appcast never
        # scans (build/dmg, not build/dist): the appcast must reference only the
        # zip — the .dmg is a manual-download convenience, not an update channel.
        run: |
          set -euo pipefail
          DMG="build/dmg/$APP_NAME-${{ inputs.version }}.dmg"
          scripts/make-dmg.sh "build/export/$APP_NAME.app" "$DMG"
          # Sign the image itself so Gatekeeper trusts the container, not just
          # the (already-signed, already-stapled) app inside it.
          codesign --force --sign "Developer ID Application" --timestamp "$DMG"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Notarize & staple DMG
        env:
          MACOS_NOTARIZATION_KEY: ${{ secrets.MACOS_NOTARIZATION_KEY }}
          MACOS_NOTARIZATION_KEY_ID: ${{ secrets.MACOS_NOTARIZATION_KEY_ID }}
          MACOS_NOTARIZATION_ISSUER_ID: ${{ secrets.MACOS_NOTARIZATION_ISSUER_ID }}
        run: |
          set -euo pipefail
          DMG="${{ steps.dmg.outputs.dmg }}"
          echo "$MACOS_NOTARIZATION_KEY" > "$RUNNER_TEMP/notary_key.p8"
          # A .dmg is itself a valid notarization submission — no wrapping zip.
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/notary_key.p8" \
            --key-id "$MACOS_NOTARIZATION_KEY_ID" \
            --issuer "$MACOS_NOTARIZATION_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          rm -f "$RUNNER_TEMP/notary_key.p8"

      - name: Tag & publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.tag }}
          # Pin the tag to the commit that was actually built, not whatever
          # the default branch points at by the time this step runs.
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            ${{ steps.package.outputs.zip }}
            ${{ steps.dmg.outputs.dmg }}
          # Reuse the exact notes embedded in the appcast (generated above) so
          # the Release page and the Sparkle update window never disagree.
          # (Replaces generate_release_notes: true, which would regenerate them
          # independently and only populate the Release page, not the appcast.)
          body_path: build/release-notes.md

      - name: Stage appcast for gh-pages
        # Publish ONLY the appcast. build/dist also holds the distribution
        # zip, which the appcast never references (enclosure URLs point at
        # GitHub Releases) — publishing it would grow gh-pages by one app
        # bundle per build, forever.
        run: |
          set -euo pipefail
          mkdir -p build/pages
          cp build/dist/appcast.xml build/pages/appcast.xml

      - name: Publish appcast to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/pages
          publish_branch: gh-pages
          keep_files: true
